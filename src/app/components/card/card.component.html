<a [routerLink]="route"
    class="group block relative rounded-3xl overflow-hidden border border-white/70 bg-white/80 backdrop-blur-sm shadow-[0_14px_35px_rgba(0,0,0,0.1)] hover:shadow-[0_20px_45px_rgba(15,118,110,0.28)] transition-all duration-300 hover:-translate-y-1 cursor-pointer">
    <div class="relative h-44">
        @if (image) {
            <img [src]="image" [alt]="title" class="w-full h-full object-cover scale-[1.01] group-hover:scale-105 transition-transform duration-500"
                loading="lazy" />
        } @else {
            <div class="w-full h-full bg-gradient-to-br from-teal-600 via-teal-500 to-amber-500 grid place-items-center">
                <svg class="w-16 h-16 text-white/85" viewBox="0 0 32 32" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 22V10l8 4V6l12 6-12 6v-8z" />
                    <path d="M6 26h20v2H6z" fill="rgba(255,255,255,0.8)" />
                </svg>
            </div>
        }

        <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/15 to-transparent"></div>
        <p class="absolute top-3 left-3 text-[10px] tracking-[0.16em] uppercase px-2 py-1 rounded-full bg-white/90 text-teal-700 font-semibold">Program</p>
    </div>

    <div class="p-4 sm:p-5">
        <h2 class="display-font text-lg sm:text-xl font-bold text-slate-800 line-clamp-2">{{ title }}</h2>
        <p class="mt-2 text-sm text-slate-500 group-hover:text-slate-700 transition-colors">Mở danh sách tập phát sóng</p>
        <div class="mt-4 inline-flex items-center gap-2 text-sm font-semibold text-teal-700">
            Nghe ngay
            <span class="inline-block group-hover:translate-x-1 transition-transform">-></span>
        </div>
    </div>
</a>
