@if (playerService.currentTrack(); as track) {
	<div class="fixed inset-x-0 bottom-0 z-40 px-3 sm:px-6 pb-3 sm:pb-4">
		<div class="max-w-6xl mx-auto rounded-3xl border border-white/15 bg-slate-950/92 text-white shadow-[0_18px_50px_rgba(0,0,0,0.34)] backdrop-blur-2xl overflow-hidden">
			<div class="p-4 sm:p-5 flex flex-col gap-4">
				<div class="flex items-start gap-4">
					@if (track.image) {
						<img [src]="track.image" [alt]="track.title" class="w-20 h-20 rounded-2xl object-cover border border-white/10" />
					} @else {
						<div class="w-20 h-20 rounded-2xl bg-white/10 grid place-items-center">
							<svg class="w-8 h-8 text-white/85" viewBox="0 0 24 24" fill="currentColor">
								<path d="M8 5v14l11-7z" />
							</svg>
						</div>
					}

					<div class="min-w-0 flex-1">
						<p class="text-[11px] uppercase tracking-[0.18em] text-teal-300/90">Đang phát</p>
						<h3 class="display-font text-lg sm:text-xl font-bold leading-tight text-white mt-1">{{ track.title }}</h3>
						<p class="mt-1 text-sm text-slate-300">{{ track.programTitle }}</p>
						@if (track.listened) {
							<span class="mt-3 inline-flex items-center rounded-full bg-emerald-400/20 px-3 py-1 text-xs font-semibold text-emerald-200">
								Đã nghe xong
							</span>
						}
					</div>

					<button
						type="button"
						(click)="closePlayer()"
						class="shrink-0 w-10 h-10 rounded-full border border-white/15 bg-white/8 hover:bg-white/14 transition-colors grid place-items-center"
						aria-label="Đóng player"
					>
						<svg class="w-5 h-5 text-white/80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<path d="M6 6l12 12M18 6L6 18" />
						</svg>
					</button>
				</div>

				<audio
					#audioRef
					controls
					(loadedmetadata)="onLoadedMetadata($event)"
					(timeupdate)="onTimeUpdate($event)"
					class="w-full h-12 accent-teal-400"
				></audio>
			</div>
		</div>
	</div>
}
