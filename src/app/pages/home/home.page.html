<section class="max-w-6xl mx-auto px-1 py-8 sm:py-10">
    <div class="rounded-3xl border border-white/60 bg-white/70 backdrop-blur-md shadow-[0_14px_45px_rgba(0,0,0,0.09)] p-5 sm:p-7 mb-6">
        <p class="display-font text-xs sm:text-sm uppercase tracking-[0.22em] text-teal-600 mb-2">VOH Radio Archive</p>
        <h1 class="display-font text-3xl sm:text-4xl font-bold text-slate-800 leading-tight">Chọn chương trình bạn muốn nghe lại</h1>
        <p class="mt-3 text-slate-600 text-sm sm:text-base max-w-2xl">Tất cả tập phát sóng được gom lại theo chương trình. Chạm vào thẻ để mở danh sách tập và nghe ngay.</p>
    </div>

    @if (loading()) {
        <div class="rounded-3xl border border-white/50 bg-white/60 backdrop-blur-sm flex justify-center items-center py-20">
            <svg class="animate-spin w-8 h-8 text-green-600" viewBox="0 0 24 24" fill="none">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
            </svg>
        </div>
    }

    @if (error()) {
        <p class="text-red-500 text-center py-8">{{ error() }}</p>
    }

    @if (!loading() && !error()) {
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
            @for (program of programs(); track program.id) {
                <app-card [title]="program.title" [image]="program.image" [route]="'/program/' + program.id" />
            }
        </div>
    }
</section>
