<div class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Chương trình</h1>

    @if (loading()) {
        <div class="flex justify-center items-center py-16">
            <svg class="animate-spin w-8 h-8 text-green-600" viewBox="0 0 24 24" fill="none">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
            </svg>
        </div>
    }

    @if (error()) {
        <p class="text-red-500 text-center py-8">{{ error() }}</p>
    }

    @if (!loading() && !error()) {
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
            @for (program of programs(); track program.id) {
                <app-card [title]="program.title" [image]="program.image" [route]="'/program/' + program.id" />
            }
        </div>
    }
</div>
